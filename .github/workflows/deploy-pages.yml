# Vue 前端 → GitHub Pages（monorepo：代码在 frontend/）
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build for GitHub Pages
        env:
          # 项目站：仓库 blog → https://用户名.github.io/blog/
          VITE_BASE_PATH: /blog/
          VITE_USE_MOCK: 'true'
          VITE_AGENT_USE_MOCK: 'true'
          VITE_API_BASE: /api
          VITE_AGENT_CHAT_URL: /api/agent/chat
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
