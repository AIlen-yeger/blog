# NapCat（OneBot v11）— QQ 协议桥，供 Bug Ops 告警与可选 qq-agent-mcp 使用
# 首次启动后扫码登录：docker logs -f napcat
# 文档参考：https://github.com/JulesLiu390/Amadeus-QQ-MCP

services:
  napcat:
    image: docker.napcat.space/napcat/napcat:latest
    container_name: napcat
    restart: unless-stopped
    ports:
      - "${NAPCAT_HTTP_PORT:-3000}:3000"
      - "${NAPCAT_WS_PORT:-3001}:3001"
    volumes:
      - ./data:/app/napcat
      - ./config:/app/napcat/config
    environment:
      - NAPCAT_UID=${NAPCAT_UID:-1000}
      - NAPCAT_GID=${NAPCAT_GID:-1000}
