# 复制到 /etc/nginx/sites-available/blog.conf 后修改 server_name
# 测试: sudo nginx -t && sudo systemctl reload nginx

upstream blog_api {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name 你的域名.com;

    # 若已用 certbot，certbot 会自动追加 443 块；也可在此 redirect
    # return 301 https://$host$request_uri;

    root /opt/blog/frontend/dist;
    index index.html;

    client_max_body_size 12m;

    # 前端 SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API：/api/* → Spring Boot /v1/*
    location /api/ {
        proxy_pass http://blog_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE / Agent 长连接
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 兼容后端直接返回 /v1/uploads/... 的链接（生产 build 会转成 /api/uploads/...）
    location /v1/ {
        proxy_pass http://blog_api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
