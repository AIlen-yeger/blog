server:
  port: 8080
  servlet:
    context-path: /v1

spring:
  application:
    name: personal-blog-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "数据库url "
    username: "数据库用户名"
    password: "数据库密码"
  data:
    redis:
      host: localhost
      port: 6379
      database: 5
      timeout: 3000ms
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  mail:
    host: smtp.qq.com
    port: 465
    username: ${QQ_SMTP_USER:}
    password: ${QQ_SMTP_AUTH_CODE:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.personalblog.entity
  configuration:
    map-underscore-to-camel-case: true

developer:
  email: ${DEVELOPER_EMAIL:}

app:
  # 启动时写入演示数据（用户/笔记/生活记录等）；默认 false，需要时改 true 启动一次即可
  seed:
    enabled: false
  jwt:
    secret: "jwt密钥"
    expiration-seconds: 604800
  dev:
    fixed-verification-code: "123456" #测试时固定验证码
  register:
    code-ttl-seconds: 300
    resend-cooldown-seconds: 60
    daily-send-limit: 5
  view:
    # 浏览增量从 Redis 刷入 MySQL 的间隔（毫秒）
    flush-interval-ms: 60000
  mail:
    enabled: true
    from: ${QQ_SMTP_USER:}
    from-name: 个人博客
    reply-to: ${QQ_SMTP_USER:}
    subject: 欢迎注册！验证码：
  upload:
    avatar-dir: ./uploads/avatars
    content-dir: ./uploads/content
  music:
    weekly-window-days: 7
    daily-key-ttl-days: 8
    # Agent 查询全量累计播放排行时返回的最大条数
    all-plays-top-limit: 30

  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
  quiet-hours:
    enabled: false
    start: "23:00"
    end: "08:00"
    zone-id: Asia/Shanghai
    allow-user-ids: []
    allow-ips: []
    allow-auth-from-whitelist-ip: true
    bypass-path-patterns:
      - /agent/ops/**
