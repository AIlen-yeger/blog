server:
  port: 8080
  servlet:
    context-path: /v1

spring:
  application:
    name: personal-blog-api
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/myblog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: '0123'
  data:
    redis:
      host: localhost
      port: 6379
      database: 5
      timeout: 3000ms
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.personalblog.entity
  configuration:
    map-underscore-to-camel-case: true

app:
  # 启动时写入演示数据（用户/笔记/生活记录等）；默认 false，需要时改 true 启动一次即可
  seed:
    enabled: false
  jwt:
    secret: personal-blog-jwt-secret-change-in-production-min-32-chars
    expiration-seconds: 604800
  dev:
    # 非空时：验证码固定为该值，不发 SES，后端控制台打 [dev] 日志；模板 179636 审核通过后清空此项
    fixed-verification-code: "123456"
  register:
    code-ttl-seconds: 300
    resend-cooldown-seconds: 60
    daily-send-limit: 5
  view:
    # 浏览增量从 Redis 刷入 MySQL 的间隔（毫秒）
    flush-interval-ms: 60000
  tencent:
    ses:
      # SendEmail 仅支持 ap-guangzhou / ap-hongkong，须与控制台发信地域一致
      region: ap-guangzhou
      endpoint: ses.ap-guangzhou.tencentcloudapi.com
      # 生产建议用环境变量：TENCENTCLOUD_SECRET_ID/KEY 或 SecretId/SecretKey
      secret-id: ""
      secret-key: ""
  mail:
    # 本地开发可 false；生产发信需 true 且配置 TENCENTCLOUD_SECRET_ID/KEY
    enabled: true
    from: 2762548283@qq.com
    from-name: 个人博客
    reply-to: 2762548283@qq.com
    subject: 欢迎注册！验证码：
    # 控制台模板「注册」ID；须状态为「已通过」后才可真实发信
    template-id: 179636
  upload:
    avatar-dir: ./uploads/avatars
    content-dir: ./uploads/content
  agent:
    # Python Agent 仅内网访问，由 Spring Boot 转发
    base-url: http://127.0.0.1:8000
    chat-path: /ai/chat
    connect-timeout-ms: 5000
    read-timeout-ms: 120000
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
